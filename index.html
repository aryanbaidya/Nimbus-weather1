<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nimbus Weather">
    <meta name="application-name" content="Nimbus Weather">
    <link rel="manifest" href="/manifest.json">
    <title>Nimbus Black</title>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.body.style.display = "block";
        document.body.style.background = "#0f172a";
        document.body.innerHTML = `
          <div style="
            color:#ff6b6b;
            padding:24px;
            font-family:monospace;
            font-size:14px;
            line-height:1.6;
          ">
            <div style="font-size:18px;
              margin-bottom:16px;">
              ❌ Startup Error
            </div>
            <b>Message:</b> ${msg}<br><br>
            <b>Line:</b> ${line}<br><br>
            <b>File:</b> ${src}<br><br>
            <b>Error:</b> ${err ? err.stack : 'none'}
          </div>
        `;
      };

      window.addEventListener("unhandledrejection", (e) => {
        document.body.style.display = "block";
        document.body.style.background = "#0f172a";
        document.body.innerHTML = `
          <div style="
            color:#ff6b6b;
            padding:24px;
            font-family:monospace;
            font-size:14px;
            line-height:1.6;
          ">
            <div style="font-size:18px;
              margin-bottom:16px;">
              ❌ Promise Error
            </div>
            <b>Reason:</b> ${e.reason}<br><br>
            <b>Stack:</b> ${e.reason?.stack || 'none'}
          </div>
        `;
      });
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg))
            .catch(err => console.warn('SW failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
